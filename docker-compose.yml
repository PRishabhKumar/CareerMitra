version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Backend.Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./Backend:/app
      - /app/node_modules
      - ./.env:/app/.env
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always